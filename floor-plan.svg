<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" width="900" height="780">
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; }
      .dim { font-size: 12px; fill: #d44; font-weight: 600; }
      .label { font-size: 11px; fill: #333; font-weight: 600; text-anchor: middle; }
      .label-sm { font-size: 10px; fill: #555; text-anchor: middle; }
      .title { font-size: 18px; fill: #111; font-weight: 800; text-anchor: middle; }
      .subtitle { font-size: 11px; fill: #888; text-anchor: middle; }
      .note { font-size: 9px; fill: #999; text-anchor: middle; }
      .wall-ext { stroke: #222; stroke-width: 4; fill: none; }
      .wall-int { stroke: #555; stroke-width: 2; fill: none; }
      .hatch { fill: #ddd; }
      .furniture { fill: none; stroke: #aaa; stroke-width: 1; stroke-dasharray: 3,3; }
      .door { fill: none; stroke: #666; stroke-width: 1.5; }
      .door-arc { fill: none; stroke: #bbb; stroke-width: 0.8; stroke-dasharray: 4,3; }
      .window { fill: #d4e8ff; stroke: #7ab; stroke-width: 1; }
      .counter { fill: #e8e0d8; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <!-- Origin: (70, 60) = top-left of exterior wall, Scale: 1ft = 30px -->
  <!-- OX=70, OY=60, W=720, H=600 -->

  <!-- Title block -->
  <text x="430" y="30" class="title">THE CASCADE 480</text>
  <text x="430" y="48" class="subtitle">480 sq ft · 24'×20' ADU · Rental-Optimized Floor Plan</text>

  <!-- Exterior walls -->
  <rect x="70" y="60" width="720" height="600" class="wall-ext" />

  <!-- Right zone divider wall (at x=14' -> 70+14*30=490) -->
  <line x1="490" y1="60" x2="490" y2="420" class="wall-int" />
  <!-- Small continuation of divider to front wall -->
  <line x1="490" y1="420" x2="490" y2="660" class="wall-int" />

  <!-- Bath/Office divider (at y=12' -> OY+12*30=420) -->
  <line x1="490" y1="420" x2="640" y2="420" class="wall-int" />

  <!-- Bath wall (at x=19' -> 70+19*30=640) -->
  <line x1="640" y1="420" x2="640" y2="660" class="wall-int" />

  <!-- Utility closet (3'x5' in kitchen area, bottom left) -->
  <rect x="70" y="510" width="90" height="150" class="wall-int" />

  <!-- ROOM LABELS -->
  <text x="280" y="300" class="label" style="font-size:14px">KITCHEN / LIVING</text>
  <text x="280" y="316" class="label-sm">14'0" × 20'0" · 280 sq ft</text>
  <text x="280" y="330" class="note">vaulted ceiling to 12'</text>

  <text x="565" y="230" class="label" style="font-size:13px">BEDROOM</text>
  <text x="565" y="246" class="label-sm">10'0" × 12'0" · 120 sq ft</text>

  <text x="565" y="540" class="label" style="font-size:11px">BATH</text>
  <text x="565" y="554" class="label-sm">5'×8'</text>

  <text x="715" y="540" class="label" style="font-size:11px">OFFICE</text>
  <text x="715" y="554" class="label-sm">5'×8'</text>

  <text x="115" y="580" class="label-sm">Utility</text>
  <text x="115" y="594" class="label-sm">3'×5'</text>

  <!-- DIMENSION LINES -->
  <!-- Width dimension -->
  <g>
    <line x1="70" y1="680" x2="790" y2="680" stroke="#d44" stroke-width="1" />
    <line x1="70" y1="675" x2="70" y2="685" stroke="#d44" stroke-width="1" />
    <line x1="790" y1="675" x2="790" y2="685" stroke="#d44" stroke-width="1" />
    <text x="430" y="695" class="dim">24' 0"</text>
  </g>
  <!-- Depth dimension -->
  <g>
    <line x1="810" y1="60" x2="810" y2="660" stroke="#d44" stroke-width="1" />
    <line x1="805" y1="60" x2="815" y2="60" stroke="#d44" stroke-width="1" />
    <line x1="805" y1="660" x2="815" y2="660" stroke="#d44" stroke-width="1" />
    <text x="825" y="365" class="dim" style="writing-mode:tb">20' 0"</text>
  </g>
  <!-- Right zone depth dimension (bedroom depth) -->
  <g>
    <line x1="850" y1="60" x2="850" y2="420" stroke="#d44" stroke-width="0.8" />
    <line x1="845" y1="60" x2="855" y2="60" stroke="#d44" stroke-width="0.8" />
    <line x1="845" y1="420" x2="855" y2="420" stroke="#d44" stroke-width="0.8" />
    <text x="860" y="245" class="dim" style="writing-mode:tb;font-size:10px">12' 0"</text>
  </g>

  <!-- Windows -->
  <!-- Living area window (left wall, centered) -->
  <rect x="62" y="200" width="8" height="120" class="window" />
  <!-- Bedroom window (right wall) -->
  <rect x="790" y="120" width="8" height="100" class="window" />
  <!-- Bedroom window (back wall) -->
  <rect x="560" y="52" width="100" height="8" class="window" />
  <!-- Kitchen window (back wall left) -->
  <rect x="150" y="52" width="80" height="8" class="window" />
  <!-- Entry door (front wall, centered in living area) -->
  <!-- Door opening at x=7' from left -> 70+7*30=280, y=660 front wall -->
  <line x1="265" y1="660" x2="265" y2="625" class="door" />
  <line x1="265" y1="625" x2="305" y2="625" class="door" />
  <line x1="305" y1="625" x2="305" y2="660" class="door" />
  <line x1="305" y1="625" x2="265" y2="585" class="door" style="stroke-dasharray:2,3;stroke:#ccc" />
  <text x="285" y="615" class="label-sm" style="font-size:8px">Entry</text>

  <!-- Bedroom door (in divider wall) -->
  <line x1="490" y1="180" x2="455" y2="180" class="door" />
  <line x1="455" y1="180" x2="455" y2="215" class="door" />
  <line x1="455" y1="215" x2="490" y2="215" class="door" />

  <!-- Bathroom door -->
  <line x1="490" y1="490" x2="455" y2="490" class="door" />
  <line x1="455" y1="490" x2="455" y2="520" class="door" />
  <line x1="455" y1="520" x2="490" y2="520" class="door" />

  <!-- KITCHEN FIXTURES -->
  <!-- Counter along left wall -->
  <rect x="70" y="90" width="75" height="330" class="counter" />
  <!-- Stove -->
  <rect x="85" y="120" width="45" height="60" rx="2" fill="#ccc" stroke="#999" stroke-width="1" />
  <text x="107" y="155" class="label-sm">Stove</text>
  <!-- Sink -->
  <rect x="85" y="220" width="45" height="40" rx="15" fill="#d4e8ff" stroke="#99b" stroke-width="1" />
  <text x="107" y="245" class="label-sm">Sink</text>
  <!-- Island / peninsula -->
  <rect x="180" y="200" width="80" height="40" class="counter" />
  <text x="220" y="225" class="label-sm">Island</text>

  <!-- LIVING FURNITURE -->
  <rect x="150" y="350" width="150" height="60" class="furniture" rx="3" />
  <text x="225" y="385" class="label-sm">Sofa</text>

  <!-- BEDROOM FURNITURE -->
  <rect x="620" y="100" width="90" height="140" class="furniture" rx="3" />
  <text x="665" y="175" class="label-sm">Queen Bed</text>
  <rect x="520" y="340" width="75" height="50" class="furniture" rx="2" />
  <text x="557" y="370" class="label-sm">Closet</text>

  <!-- BATHROOM FIXTURES -->
  <rect x="500" y="480" width="55" height="28" rx="14" fill="#d4e8ff" stroke="#99b" stroke-width="1" />
  <text x="527" y="498" class="label-sm">Shower</text>
  <circle cx="575" cy="520" r="15" fill="#d4e8ff" stroke="#99b" stroke-width="1" />
  <text x="575" y="524" class="label-sm">WC</text>
  <rect x="590" y="570" width="36" height="18" rx="9" fill="#e8e0d8" stroke="#999" stroke-width="1" />
  <text x="608" y="582" class="label-sm">Vanity</text>

  <!-- OFFICE FURNITURE -->
  <rect x="660" y="460" width="65" height="35" class="furniture" rx="2" />
  <text x="692" y="482" class="label-sm">Desk</text>

  <!-- Stackable W/D in utility closet -->
  <rect x="78" y="540" width="35" height="35" fill="#e8e0d8" stroke="#999" stroke-width="1" />
  <text x="95" y="562" class="label-sm">W/D</text>

  <!-- Porch at entry -->
  <rect x="240" y="662" width="100" height="30" class="furniture" rx="2" />
  <text x="290" y="682" class="label-sm">Covered Porch 4'×6'</text>

  <!-- NORTH ARROW -->
  <g transform="translate(50, 65)">
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#d44" stroke-width="2" />
    <polygon points="-5,-14 0,-22 5,-14" fill="#d44" />
    <text x="0" y="-26" class="dim" style="font-size:9px;text-anchor:middle">N</text>
  </g>

  <!-- Specs box -->
  <g transform="translate(430, 710)">
    <rect x="0" y="0" width="360" height="55" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" rx="4" />
    <text x="15" y="18" style="font-size:9px;fill:#666">Foundation: Slab-on-grade</text>
    <text x="180" y="18" style="font-size:9px;fill:#666">Walls: 2×6 @ 16" o.c.</text>
    <text x="15" y="34" style="font-size:9px;fill:#666">Roof: Gable 6:12 pitch, asphalt shingle</text>
    <text x="180" y="34" style="font-size:9px;fill:#666">Ceiling: 8' flat / 12' vault (living)</text>
    <text x="15" y="50" style="font-size:9px;fill:#666">Heat: Mini-split heat pump</text>
    <text x="180" y="50" style="font-size:9px;fill:#666">Hot Water: Tankless electric</text>
  </g>
</svg>
